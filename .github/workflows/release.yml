name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "5.0.x"

      - name: publish
        shell: pwsh
        run: dotnet publish .\flowx.csproj -c Release -o .\publish

      - name: zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\package\flowx -Force | Out-Null
          Copy-Item .\publish\* .\package\flowx\ -Recurse -Force
          New-Item -ItemType Directory -Path .\release -Force | Out-Null
          Compress-Archive -Path .\package\flowx -DestinationPath .\release\flowx.zip -Force

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowx
          path: release/flowx.zip

      - name: github release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/flowx.zip
